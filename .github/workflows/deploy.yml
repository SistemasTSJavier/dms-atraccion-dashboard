name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          GITHUB_PAGES: 'true'
          REPO_NAME: ${{ github.event.repository.name }}
        run: npm run build

      - name: Verify build output
        run: |
          if grep -q "main.tsx" dist/index.html; then
            echo "ERROR: dist/index.html still references main.tsx - build failed"
            exit 1
          fi
          if grep -q "%BASE_URL%" dist/index.html; then
            echo "ERROR: dist/index.html has unreplaced %BASE_URL%"
            exit 1
          fi
          echo "Build OK"
          ls -la dist/
          ls -la dist/data/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
